app = 'reserva-online-mysql-pcelias'
primary_region = 'gru'

[build]
  image = 'mysql:8.0.37'

[processes]
  app = """--datadir /data/mysql \
    --default-authentication-plugin mysql_native_password"""

[mounts]
  source = 'mysqldata'
  destination = '/data'

[env]
  MYSQL_DATABASE = 'reserva_online'
  MYSQL_USER = 'reserva_user'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
